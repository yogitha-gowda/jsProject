<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Functions</h1>
<p>Call a function which performs a calculation and returns the result:</p>
<input type="number" id="sc" name="Science" placeholder="Science">
<input type="number" id="en" name="English" placeholder="English">
<input type="number" id="ss" name="Social" placeholder="Social">
<input type="number" id="ma" name="Maths" placeholder="Maths">
<input type="number" id="hin" name="Hindi" placeholder="Hindi">
<br><br>
<button type="button" onclick="GetResult()">Result</button>
<p id="demo"></p>
<script>
function GetResult() {
    let result = GetAverage();
    document.getElementById("demo").innerHTML = "Average = " + result;
}
function GetAverage() {
    let sc = Number(document.getElementById("sc").value);
    let en = Number(document.getElementById("en").value);
    let ss = Number(document.getElementById("ss").value);
    let ma = Number(document.getElementById("ma").value);
    let hin = Number(document.getElementById("hin").value);
    let total = sc + en + ss + ma + hin;
    return total / 5;
}
</script>
</body>
</html>
