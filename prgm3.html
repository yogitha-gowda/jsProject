<!DOCTYPE html>
<html>
<body>
<h2>Bracket Indexing</h2>
<p>JavaScript array elements are accessed using numeric indexes (starting from 0).</p>
<p>Display value of 1st Car:</p>
<p id="demo"></p>
<script>
const cars = ["Saab", "Volvo", "BMW"];
document.getElementById("demo").innerHTML = cars[0];
</script>
<br>
<p>Display all cars:</p>
<p id="demo2"></p>
<script>
const cars1 = ["Saab", "Volvo", "BMW"];
document.getElementById("demo2").innerHTML = cars1;
</script>
<br>
<p>Display array as a string:</p>
<p id="demo3"></p>
<script>
const cars2 = ["Saab", "Volvo", "BMW"];
document.getElementById("demo3").innerHTML = cars2.toString();
</script>
</body>
</html>
