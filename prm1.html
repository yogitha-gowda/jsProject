<!DOCTYPE html>
<html>
<head>
    <script>
        function myFunction() {
            let bb = true;
            const cars = ["Saab", "Volvo", "BMW"];
            document.getElementById('lname').value = "Paragraph changed. " + cars[0];
            if (cars.length > 0) {
                document.getElementById('demo').innerHTML = "Paragraph changed. " + cars[0];
            }
        }
    </script>
</head>
<body>
    <h2>Demo - JavaScript in Head section</h2>
    <p id="demo">A Paragraph</p>
    <button type="button" onclick="myFunction()">Try it</button>
    <br><br>
    <input type="text" id="lname" name="lname">
    <script>
        let x = 5;
        // document.write(5 + x);
        window.alert(5 + 6);
        if (confirm("Do you want to save changes?") == true) {
            alert("Changes saved!");
        } else {
            alert("Changes cancelled!");
        }
    </script>
</body>
</html>
